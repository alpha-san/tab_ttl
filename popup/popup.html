<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabTTL</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <span class="logo">Tab<span>TTL</span></span>
    <div class="header-controls">
      <button class="btn-icon" id="settingsBtn" title="Open settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <label class="toggle" title="Enable / disable TabTTL">
        <input type="checkbox" id="enableToggle" />
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </label>
    </div>
  </header>

  <!-- Status banner (shown when paused/disabled) -->
  <div id="statusBanner" class="status-banner hidden"></div>

  <!-- Main tab list -->
  <div id="tabList" class="tab-list"></div>

  <!-- Footer -->
  <footer>
    <button class="btn-history" id="historyBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
      </svg>
      Closed tabs
      <span class="history-count" id="historyCount"></span>
    </button>
    <button class="btn-icon btn-refresh" id="refreshBtn" title="Refresh">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.49"/>
      </svg>
    </button>
  </footer>

  <!-- History slide-in panel -->
  <div id="historyPanel" class="history-panel">
    <div class="history-header">
      <button class="btn-back" id="historyBackBtn" title="Back">&#8592;</button>
      <span class="history-title">Closed Tabs</span>
      <button class="btn-text-sm" id="clearHistoryBtn">Clear all</button>
    </div>
    <div id="historyList" class="history-list"></div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
