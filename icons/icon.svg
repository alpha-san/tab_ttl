<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#4285f4"/>
  <!-- Tab bar hint -->
  <rect x="16" y="18" width="36" height="14" rx="7" fill="white" opacity="0.9"/>
  <rect x="56" y="22" width="20" height="10" rx="5" fill="white" opacity="0.4"/>
  <rect x="80" y="22" width="16" height="10" rx="5" fill="white" opacity="0.3"/>
  <!-- Clock face -->
  <circle cx="64" cy="80" r="34" fill="white"/>
  <!-- Clock inner -->
  <circle cx="64" cy="80" r="28" fill="#4285f4"/>
  <!-- Clock tick marks (12, 3, 6, 9) -->
  <rect x="62.5" y="54" width="3" height="6" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="84" y="78.5" width="6" height="3" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="62.5" y="96" width="3" height="6" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="38" y="78.5" width="6" height="3" rx="1.5" fill="white" opacity="0.6"/>
  <!-- Hour hand (pointing ~10) -->
  <line x1="64" y1="80" x2="52" y2="66" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~2) -->
  <line x1="64" y1="80" x2="78" y2="68" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="80" r="3" fill="white"/>
</svg>
